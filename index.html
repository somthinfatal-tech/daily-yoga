<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Yoga">
<title>Daily Yoga</title>

<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@200;300;400;500;600;700&family=Geist+Mono:wght@400;500&family=IBM+Plex+Serif:wght@200;300;400&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="app/yoga-app.css">

<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0c; overscroll-behavior: none; }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    color: #f5f5f7;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { width: 100vw; height: 100vh; height: 100dvh; }

  /* Desktop: cozy centered phone frame on a moody backdrop.
     Mobile: fills the screen, no frame. */
  .stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, #1a1924 0%, #0a0a0c 70%),
      #0a0a0c;
    overflow: hidden;
    position: relative;
  }
  .stage-grain {
    position: absolute; inset: 0;
    opacity: 0.03;
    background-image: repeating-radial-gradient(circle at 17% 33%, rgba(255,255,255,0.5) 0 0.5px, transparent 0.5px 1.4px);
    pointer-events: none;
  }
  .phone-frame {
    width: 400px;
    height: 840px;
    border-radius: 46px;
    background: #000;
    padding: 8px;
    position: relative;
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.07),
      0 30px 60px -20px rgba(0,0,0,0.6),
      0 60px 120px -40px rgba(0,0,0,0.5);
  }
  .phone-notch {
    position: absolute;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    width: 100px; height: 26px;
    background: #000;
    border-radius: 14px;
    z-index: 100;
    pointer-events: none;
  }
  .phone-screen {
    width: 100%; height: 100%;
    border-radius: 38px;
    overflow: hidden;
    position: relative;
    background: #0a0a0c;
  }
  /* Mobile: take over the screen, no frame */
  @media (max-width: 500px), (max-height: 700px) {
    .phone-frame {
      width: 100%; height: 100%;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }
    .phone-screen { border-radius: 0; }
    .phone-notch { display: none; }
    .stage { background: #0a0a0c; }
  }

  /* Installed PWA (Android/iOS standalone): defer to the real OS status &
     gesture bars instead of the faux one, and inset content past them. */
  @media (display-mode: standalone), (display-mode: fullscreen) {
    .status-bar { display: none !important; }
    .home { padding-top: calc(10px + env(safe-area-inset-top)) !important; }
    .session-top { padding-top: calc(10px + env(safe-area-inset-top)) !important; }
    .instructor-stage { top: calc(64px + env(safe-area-inset-top)) !important; }
    .session-foot { padding-bottom: calc(18px + env(safe-area-inset-bottom)) !important; }
    .audio-toggles { bottom: calc(8px + env(safe-area-inset-bottom)) !important; }
    .settings-card, .script-card { padding-bottom: calc(24px + env(safe-area-inset-bottom)) !important; }
  }

  /* Install banner (Android) */
  .install-fab {
    position: fixed;
    left: 50%;
    bottom: calc(18px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 200;
    display: flex; align-items: center; gap: 8px;
    padding: 11px 18px;
    border-radius: 26px;
    background: #5ec8e0;
    color: #06141a;
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.2px;
    border: none; cursor: pointer;
    box-shadow: 0 10px 30px -8px rgba(94,200,224,0.5);
    animation: fabIn 0.4s ease-out;
  }
  @keyframes fabIn { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- data, scene, app, tweaks panel -->
<script src="app/yoga-data.js"></script>
<script src="app/yoga-script.js"></script>
<script src="app/yoga-kling.js"></script>
<script src="app/elevenlabs.js"></script>
<script type="text/babel" src="app/pose-scene.jsx"></script>
<script type="text/babel" src="app/instructor.jsx"></script>
<script type="text/babel" src="app/yoga-app.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { YogaApp } = window;

function App() {
  const [tweaks, setTweaks, resetTweaks] = useTweaks();

  const theme = {
    id: 'ink',
    label: 'Ink',
    greeting: 'Today\u2019s practice.',
    colorMode: tweaks.colorMode,
    fontPreset: tweaks.fontPreset,
    timerStyle: tweaks.timerStyle,
    autoAdvance: tweaks.autoAdvance,
    showWarnings: tweaks.showWarnings,
    showPoseImage: tweaks.showPoseImage,
    cssVars: {}
  };

  return (
    <div className="stage">
      <div className="stage-grain" />
      <div className="phone-frame">
        <div className="phone-notch" />
        <div className="phone-screen">
          <YogaApp theme={theme} />
        </div>
      </div>
      <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} resetTweaks={resetTweaks} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
/* ---- PWA: service worker + Android install prompt ---- */
(function () {
  // Register the service worker (offline app shell).
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) {
        console.warn('SW registration failed:', e && e.message);
      });
    });
  }

  // Custom "Add to Home screen" affordance for Android/Chrome.
  var deferred = null;
  var fab = null;
  function makeFab() {
    if (fab) return fab;
    fab = document.createElement('button');
    fab.className = 'install-fab';
    fab.innerHTML = '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 3v10.6l3.3-3.3 1.4 1.4L12 17 7.3 11.7l1.4-1.4L12 13.6V3zM5 19h14v2H5z"/></svg> Add to Home screen';
    fab.addEventListener('click', function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.finally(function () {
        deferred = null;
        if (fab) fab.remove();
      });
    });
    document.body.appendChild(fab);
    return fab;
  }
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    makeFab();
  });
  window.addEventListener('appinstalled', function () {
    deferred = null;
    if (fab) { fab.remove(); fab = null; }
  });
})();
</script>
</body>
</html>
